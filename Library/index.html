<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div>
    <h1>Library</h1>
    <button id="newbook">+ New book</button><br>
    <div class="pop-up" style="display: none;">
      <h3 onclick="PopUp">Add book</h3>
      <form class="elements">
        <input type="text" placeholder="title" id="title">
        <input type="text" placeholder="author" id="author">
        <input type="number" placeholder="pages" id="pgs">
        <p class="check"><label for="Read">Read</label>
        <input type="checkbox" name="Read" id="read"></p>
        
        <button type="submit" id="addbook">Add book + </button>
        <button id="close">Close</button>
      </form>
    </div>

    <div class="content">

    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
