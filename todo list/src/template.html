<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
</head>
<body>
  <h1>Todo list</h1>
  <div class="container">
    
    <div class="right">
      <h1>Projects</h1>
      <button class="addProject">+ Add project</button>
      <div class="projectList">
      </div>
    </div>
    <div class="left">
      <h1>Todos</h1>
      <div class="todos">
        <button class="addTodo"> + Add a todo</button>
        <div class="formContainer">
          <form>
            <label for="title">Title</label>
            <input type="text" name="title" id="title" placeholder="task name" required>
            <label for="desc">Description</label>
            <textarea name="desc" id="desc" placeholder="details about your task" maxlength="200"></textarea>
            <div id="date">
              <label for="dueDate">Due Date</label>
              <input type="date" name="date" id="dueDate" required>
            </div>
            <div class="priority">
              <label for="priority">Priority</label>
              <select id="priority" required>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </div>
            <button type="submit" class="submit">Add task</button>
            <button id="close">Close</button>
          </form>
        </div>
        <div class="projectForm">
          <form>
            <label for="projectname">
              Project Name:
              <input type="text" id="projectName" required>
            </label>
            <button type="submit" id="submitProject">+ Add project</button>
            <button id="close">Close</button>
          </form>
        </div>
        <div class="todoList">
            <!-- <p>title</p>
            <p>desc</p>
            <p>date</p>
            <p>priority</p> -->
            <div class="btns">
              <!-- <button id="done">✔️Done</button>
              <button id="edit">✏️Edit</button>
              <button id="delete">❌Delete</button> -->
            </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
